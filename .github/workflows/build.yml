name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permet de relancer le build à la main depuis l'onglet Actions

permissions:
  contents: write       # nécessaire pour publier l'APK dans une Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Compiler l'APK (debug, installable directement)
        run: ./gradlew assembleDebug

      - name: Renommer l'APK
        run: cp app/build/outputs/apk/debug/app-debug.apk Tuner.apk

      - name: Publier dans la Release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Tuner — dernière version
          body: |
            Dernière version de l'accordeur, recompilée automatiquement.
            Téléchargez **Tuner.apk** ci-dessous et installez-le sur votre téléphone Android.
          files: Tuner.apk
